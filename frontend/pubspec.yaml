name: frontend
description: EasyTour mobile application
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
